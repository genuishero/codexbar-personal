name: Build Windows Version

on:
  push:
    tags:
      - 'v*'
    branches:
      - feature/windows-version
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: codexbar-win
        run: npm install

      - name: Build Electron app
        working-directory: codexbar-win
        run: npm run build

      - name: Build Windows installer
        working-directory: codexbar-win
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexbar-win-installer
          path: codexbar-win/release/*.exe
          retention-days: 30

      - name: Get version
        id: get_version
        working-directory: codexbar-win
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: codexbar-win/release/*.exe
          name: CodexBar Windows v${{ steps.get_version.outputs.VERSION }}
          body: |
            Windows 版本 CodexBar

            ## 功能
            - 多账号管理
            - 系统托盘集成
            - 本地账号发现
            - CSV 导入导出
            - 用量监控与预警
            - 全局快捷键 (Ctrl+Shift+1~5)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}